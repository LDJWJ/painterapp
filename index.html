<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painter App - 이미지 편집기</title>
    <link rel="stylesheet" href="style.css">
    <!-- Pretendard -->
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <!-- Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn active" data-tool="select" title="선택 (영역 선택)">
                    <span class="icon">◻</span>
                    <span class="label">선택</span>
                </button>
                <button class="tool-btn" data-tool="rectangle" title="사각형 그리기">
                    <span class="icon">▭</span>
                    <span class="label">사각형</span>
                </button>
                <button class="tool-btn" data-tool="arrow" title="화살표 그리기">
                    <span class="icon">→</span>
                    <span class="label">화살표</span>
                </button>
                <button class="tool-btn" data-tool="mosaic" title="모자이크 처리">
                    <span class="icon">▦</span>
                    <span class="label">모자이크</span>
                </button>
                <button class="tool-btn" data-tool="erase" title="영역 삭제">
                    <span class="icon">⌫</span>
                    <span class="label">삭제</span>
                </button>
                <button class="tool-btn" data-tool="leftclick" title="마우스 좌클릭 아이콘">
                    <span class="icon">🖱</span>
                    <span class="label">좌클릭</span>
                </button>
                <button class="tool-btn" data-tool="rightclick" title="마우스 우클릭 아이콘">
                    <span class="icon">🖱</span>
                    <span class="label">우클릭</span>
                </button>
                <button class="tool-btn" data-tool="text" title="텍스트 입력">
                    <span class="icon">T</span>
                    <span class="label">텍스트</span>
                </button>
            </div>

            <div class="separator"></div>

            <div class="option-group">
                <label class="option-label">
                    색상
                    <input type="color" id="colorPicker" value="#ff0000">
                </label>
                <div class="preset-colors">
                    <button class="color-preset" data-color="#ff0000" style="background-color: #ff0000;" title="빨강"></button>
                    <button class="color-preset" data-color="#0066ff" style="background-color: #0066ff;" title="파랑"></button>
                    <button class="color-preset" data-color="#00cc00" style="background-color: #00cc00;" title="초록"></button>
                    <button class="color-preset" data-color="#000000" style="background-color: #000000;" title="검정"></button>
                </div>
            </div>

            <div class="option-group">
                <span class="option-label">두께</span>
                <div class="thickness-presets">
                    <button class="thickness-btn" data-width="1" title="1px"><span class="thickness-dot" style="width:2px;height:2px;"></span></button>
                    <button class="thickness-btn" data-width="3" title="3px"><span class="thickness-dot" style="width:4px;height:4px;"></span></button>
                    <button class="thickness-btn active" data-width="5" title="5px"><span class="thickness-dot" style="width:6px;height:6px;"></span></button>
                    <button class="thickness-btn" data-width="8" title="8px"><span class="thickness-dot" style="width:9px;height:9px;"></span></button>
                    <button class="thickness-btn" data-width="12" title="12px"><span class="thickness-dot" style="width:12px;height:12px;"></span></button>
                    <button class="thickness-btn" data-width="17" title="17px"><span class="thickness-dot" style="width:16px;height:16px;"></span></button>
                </div>
                <span id="lineWidthValue">5px</span>
            </div>

            <div class="option-group">
                <label class="option-label">
                    블록 크기
                    <input type="range" id="blockSize" min="10" max="30" value="15">
                    <span id="blockSizeValue">15px</span>
                </label>
            </div>

            <div class="separator"></div>

            <div class="option-group">
                <label class="option-label">
                    출력
                    <select id="outputPreset" class="output-select" title="복사/다운로드 시 적용되는 출력 크기">
                        <option value="png:1">PNG 원본</option>
                        <option value="jpeg:1:0.92">JPEG 고화질</option>
                        <option value="jpeg:1:0.75" selected>JPEG 표준 ★</option>
                        <option value="jpeg:1:0.5">JPEG 저용량</option>
                        <option value="jpeg:0.75:0.8">75% 축소</option>
                        <option value="jpeg:0.5:0.8">50% 축소</option>
                        <option value="jpeg:0.25:0.8">25% 축소</option>
                    </select>
                </label>
                <span id="outputSizeLabel" class="output-size-label">-</span>
            </div>

            <div class="separator"></div>

            <div class="action-group">
                <button class="action-btn" id="resizeBtn" title="이미지 리사이즈">
                    <span class="icon">⤡</span>
                    <span class="label">리사이즈</span>
                </button>
                <button class="action-btn" id="undoBtn" title="실행 취소 (Ctrl+Z / Cmd+Z)">
                    <span class="icon">↶</span>
                    <span class="label">취소</span>
                </button>
                <button class="action-btn" id="copyBtn" title="클립보드에 복사 (Ctrl+C / Cmd+C)">
                    <span class="icon">📋</span>
                    <span class="label">복사</span>
                </button>
                <button class="action-btn" id="downloadBtn" title="이미지 다운로드">
                    <span class="icon">⬇</span>
                    <span class="label">다운로드</span>
                </button>
            </div>

            <div class="separator"></div>

            <div class="action-group zoom-group">
                <button class="action-btn" id="zoomOutBtn" title="축소 (-)">
                    <span class="icon">－</span>
                    <span class="label">축소</span>
                </button>
                <button class="action-btn" id="zoomResetBtn" title="원래 크기">
                    <span class="zoom-label" id="zoomLevelLabel">100%</span>
                    <span class="label">크기</span>
                </button>
                <button class="action-btn" id="zoomInBtn" title="확대 (+)">
                    <span class="icon">＋</span>
                    <span class="label">확대</span>
                </button>
            </div>
        </div>

        <!-- 텍스트 도구 전용 서식 바 (텍스트 도구 선택 시에만 표시) -->
        <div class="text-toolbar" id="textToolbar">
            <span class="tb-label">글꼴</span>
            <select id="fontFamily" class="font-select">
                <option value="Pretendard">Pretendard</option>
                <option value="Noto Sans KR">Noto Sans KR</option>
                <option value="맑은 고딕">맑은 고딕</option>
                <option value="굴림">굴림</option>
                <option value="Arial">Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier New</option>
            </select>
            <input type="number" id="textFontSize" class="font-size-input" value="24" min="8" max="200" step="1">
            <span class="tb-label">px</span>
            <div class="separator"></div>
            <button class="fmt-btn" id="boldBtn" title="굵게"><b>B</b></button>
            <button class="fmt-btn" id="italicBtn" title="기울기"><i>I</i></button>
            <button class="fmt-btn" id="underlineBtn" title="밑줄"><u>U</u></button>
            <div class="separator"></div>
            <button class="fmt-btn" id="alignLeftBtn" title="왼쪽 정렬">왼</button>
            <button class="fmt-btn" id="alignCenterBtn" title="가운데 정렬">중</button>
            <button class="fmt-btn" id="alignRightBtn" title="오른쪽 정렬">오</button>
        </div>

        <div class="canvas-container">
            <div class="canvas-wrapper">
                <canvas id="mainCanvas"></canvas>
                <canvas id="overlayCanvas"></canvas>
                <canvas id="textCanvas"></canvas>
            </div>
            <div class="placeholder" id="placeholder">
                <p>📷 이미지를 붙여넣으세요</p>
                <p class="shortcut">Ctrl + V &nbsp;/&nbsp; ⌘ + V</p>
            </div>
        </div>

        <div class="status-bar">
            <span id="statusText">이미지를 붙여넣어 시작하세요</span>
            <span id="imageSize"></span>
        </div>
    </div>

    <!-- 리사이즈 모달 -->
    <div class="modal-backdrop" id="resizeModal">
        <div class="modal">
            <div class="modal-title">이미지 리사이즈</div>
            <div class="modal-body">
                <div class="resize-presets">
                    <button class="preset-btn" data-scale="1">100%</button>
                    <button class="preset-btn" data-scale="0.75">75%</button>
                    <button class="preset-btn" data-scale="0.5">50%</button>
                    <button class="preset-btn" data-scale="0.25">25%</button>
                </div>
                <div class="resize-inputs">
                    <div class="resize-row">
                        <label>가로</label>
                        <input type="number" id="resizeWidth" min="1" max="10000">
                        <span>px</span>
                    </div>
                    <div class="resize-lock">
                        <button class="lock-btn active" id="aspectLockBtn" title="비율 고정">🔒 비율 고정</button>
                    </div>
                    <div class="resize-row">
                        <label>세로</label>
                        <input type="number" id="resizeHeight" min="1" max="10000">
                        <span>px</span>
                    </div>
                </div>
                <div class="resize-info" id="resizeInfo"></div>
            </div>
            <div class="modal-actions">
                <button class="modal-cancel" id="resizeCancelBtn">취소</button>
                <button class="modal-confirm" id="resizeConfirmBtn">적용</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
